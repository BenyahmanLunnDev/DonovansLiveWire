name: Daily Scrape

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/scrape.yml"
      - "src/**"
      - "pyproject.toml"
      - "README.md"
  schedule:
    - cron: "7 13 * * *"
    - cron: "7 14 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wireman-tracker-pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: chrome

      - name: Gate on 6 AM Pacific
        run: |
          LOCAL_HOUR=$(TZ=America/Los_Angeles date +%H)
          if [ "$LOCAL_HOUR" != "06" ]; then
            echo "Current Pacific hour is $LOCAL_HOUR, skipping this DST coverage run."
            exit 0
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run scraper
        env:
          WIREMAN_BROWSER_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: python -m wireman_tracker --root .

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: refresh wireman tracker"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
